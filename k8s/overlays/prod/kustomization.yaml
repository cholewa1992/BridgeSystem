apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bridge

resources:
  - ../../base

# Production overlay assumes:
#  - A managed Postgres (external) — comment out the postgres.yaml resource
#    in base/kustomization.yaml and provide a DB_URL pointing at it.
#  - Real secrets injected via SealedSecret / ExternalSecret, not the
#    secret.example.yaml file in base/.
