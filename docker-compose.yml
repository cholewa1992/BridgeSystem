services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bridge
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bridge
      DB_USER: bridge
      DB_PASSWORD: bridge
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: Bridge System
      WEBAUTHN_ORIGINS: http://localhost:8080
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8080:8080"

  # Frontend container with the nginx proxy. Opt-in via `--profile full`
  # because backend already binds host :8080.
  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      BACKEND_HOST: backend:8080
    ports:
      - "3000:80"
    profiles: ["full"]

volumes:
  pgdata:
