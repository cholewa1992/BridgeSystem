spring.application.name=bridge-system-api

# ── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bridge}
spring.datasource.username=${DB_USER:bridge}
spring.datasource.password=${DB_PASSWORD:bridge}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholder-replacement=false

# ── Sessions ───────────────────────────────────────────────────────────────
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.timeout=7d
server.servlet.session.cookie.name=BRIDGE_SESSION
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# ── WebAuthn ───────────────────────────────────────────────────────────────
app.webauthn.rp-id=${WEBAUTHN_RP_ID:localhost}
app.webauthn.rp-name=${WEBAUTHN_RP_NAME:Bridge System}
app.webauthn.origins=${WEBAUTHN_ORIGINS:http://localhost:8080}

# ── CORS ───────────────────────────────────────────────────────────────────
# In production set CORS_ORIGINS to the frontend domain. In dev the Vite proxy
# makes cross-origin requests unnecessary, but localhost is listed as a fallback.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080}

# ── Actuator ───────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.probes.enabled=true

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.com.bridgesystem=DEBUG
