{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bridge-system.fullname" . }}-secrets
  labels:
    {{- include "bridge-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required (or set secrets.existingSecret)" .Values.secrets.dbPassword | quote }}
{{- end -}}
