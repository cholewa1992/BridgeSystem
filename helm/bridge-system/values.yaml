image:
  pullPolicy: IfNotPresent
  backend:
    repository: ghcr.io/cholewa1992/bridge-system-backend
    tag: ""              # defaults to chart appVersion
  frontend:
    repository: ghcr.io/cholewa1992/bridge-system-frontend
    tag: ""

# Static replica counts — ignored when autoscaling.*.enabled is true.
replicas:
  backend: 2
  frontend: 2

autoscaling:
  backend:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  frontend:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

resources:
  backend:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  frontend:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

ingress:
  enabled: true
  className: nginx
  host: bridge.example.com
  annotations: {}
  tls:
    enabled: true
    secretName: bridge-tls

# Embedded Postgres (StatefulSet). For production prefer a managed DB and
# set `embedded: false` plus `external.url`.
postgres:
  embedded: true
  storage: 10Gi
  image: postgres:16-alpine
  external:
    url: ""
    username: ""
    existingSecret: ""        # secret with keys: username, password
    passwordKey: password
    usernameKey: username

webauthn:
  rpId: bridge.example.com
  rpName: "Bridge System"
  origins: "https://bridge.example.com"

cors:
  allowedOrigins: "https://bridge.example.com"

cookie:
  secure: true

# Inline secrets (only used if `secrets.existingSecret` is empty). For prod
# point `existingSecret` at a SealedSecret / ExternalSecret you manage.
secrets:
  existingSecret: ""
  dbUsername: bridge
  dbPassword: ""
